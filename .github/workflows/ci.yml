name: CI/CD Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Build Docker images
        run: docker compose build

      - name: Start services
        run: docker compose up -d

      - name: Wait for services
        run: sleep 20

      - name: Run Unit Tests
        run: docker compose exec -T app npm test -- tests/unit

      - name: Run Integration Tests
        run: docker compose exec -T app npm test -- tests/integration

      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Tag and Push Docker image
        run: |
          docker tag my-ratelimit-service-app:latest ${{ secrets.DOCKER_USERNAME }}/my-ratelimit-service:latest
          docker push ${{ secrets.DOCKER_USERNAME }}/my-ratelimit-service:latest

      - name: Stop services
        run: docker compose down